<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <!-- Use root CSS styles for particles -->
    <link rel="stylesheet" href="/styles.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .not-found-container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            cursor: grab;
            will-change: transform, opacity;
        }

        .glass-card.dragging {
            cursor: grabbing;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 30px rgba(255, 255, 255, 0.1);
        }

        .error-message {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-block;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .back-button:active {
            transform: translateY(1px);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @media (max-width: 768px) {
            .not-found-container {
                width: 100%;
                padding: 0 20px;
                box-sizing: border-box;
            }

            .glass-card {
                padding: 40px 30px;
                width: 100%;
                box-sizing: border-box;
                margin: 0 auto;
            }

            .error-code {
                font-size: 80px;
            }

            .error-message {
                font-size: 18px;
            }
        }
    </style>
</head>

            <a id="back-btn" href="/" class="back-button">Return to Base</a>
        </div>
    </div>

    <script src="/particles.min.js"></script>
    <script src="/script.js"></script>

            "Let's scrub that flight.",
            "Step away from the ledge.",
            "Deploy the digital life raft.",
            "Time to moonwalk out of here.",
            "Retreat into the bushes.",
            "Sneak out the back door.",

            "Scramble the rescue jets.",
            "Cut the cord and run.",
            "Use a get-out-of-jail-free card.",
            "Jump into the nearest wormhole.",
            "Return to the realm of the living.",
            "Dial it back to zero.",
            "Ask Scotty to beam us up.",
            "Let's bounce."

        document.getElementById('back-btn').textContent = buttonMessages[Math.floor(Math.random() * buttonMessages.length)];

        // Swipe Physics Engine
        const card = document.querySelector('.glass-card');
        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        card.addEventListener('pointerdown', e => {
            // Do not intercept clicks/touches on the button
            if (e.target.closest('#back-btn')) return;

            isDragging = true;
            startX = e.clientX;
            currentX = e.clientX;

            // Disable animations while dragging
            card.style.transition = 'none';
            card.classList.add('dragging');
        });

        const handleMove = e => {
            if (!isDragging) return;

            currentX = e.clientX;
            const deltaX = currentX - startX;
            const rotate = Math.max(-15, Math.min(15, deltaX * 0.05));

            card.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;

            // Visual indicator for swipe threshold
            if (Math.abs(deltaX) > 100) {
                card.style.opacity = '0.8';
            } else {
                card.style.opacity = '1';
            }
        };

        const handleEnd = e => {
            if (!isDragging) return;
            isDragging = false;
            card.classList.remove('dragging');

            const deltaX = currentX - startX;

            if (Math.abs(deltaX) > 100) {
                // Threshold crossed! 

                // 1. Create a ghost clone to handle the exit animation seamlessly
                const clone = card.cloneNode(true);
                clone.style.position = 'absolute';
                clone.style.left = card.offsetLeft + 'px';
                clone.style.top = card.offsetTop + 'px';
                clone.style.margin = '0';
                clone.style.width = card.offsetWidth + 'px';
                clone.style.height = card.offsetHeight + 'px';
                clone.style.boxSizing = 'border-box';
                // Lock the clone into the exact rotation state the user dragged it to
                const currentRotate = Math.max(-15, Math.min(15, deltaX * 0.05));
                clone.style.transform = `translateX(${deltaX}px) rotate(${currentRotate}deg)`;

                card.parentNode.appendChild(clone);

                // Force CSS reflow
                clone.getBoundingClientRect();

                // Send the clone flying off the screen!
                clone.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease';
                const targetX = deltaX + Math.sign(deltaX) * window.innerWidth;
                const targetRotate = Math.sign(deltaX) * 20;
                clone.style.transform = `translateX(${targetX}px) rotate(${targetRotate}deg)`;
                clone.style.opacity = '0';

                // Destroy the clone once it leaves the screen
                setTimeout(() => clone.remove(), 500);

                // 2. Instantly prepare the REAL card as the "new" card
                document.getElementById('error-text').textContent = messages[Math.floor(Math.random() * messages.length)];
                document.getElementById('back-btn').textContent = buttonMessages[Math.floor(Math.random() * buttonMessages.length)];

                // Teleport the real card to the exact opposite side of the screen
                card.style.transition = 'none';
                card.style.transform = `translateX(${-Math.sign(deltaX) * window.innerWidth}px) rotate(${-Math.sign(deltaX) * 20}deg)`;
                card.style.opacity = '0';

                // Force CSS reflow so the browser registers the teleport
                card.getBoundingClientRect();

                // 3. Slide the new card into the center simultaneously!
                card.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease';
                card.style.transform = 'translateX(0px) rotate(0deg)';
                card.style.opacity = '1';

            } else {
                // Did not cross threshold, snap back to center
                card.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease';
                card.style.transform = 'translateX(0px) rotate(0deg)';
                card.style.opacity = '1';
            }
        };

        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleEnd);
        window.addEventListener('pointercancel', handleEnd);
    </script>
